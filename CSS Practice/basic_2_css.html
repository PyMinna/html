<!DOCTYPE html>
<html>
<head>
    <title>Button creating</title>

<style>
    h1 {
        color: crimson;
        font-family:Arial, Helvetica, sans-serif;
        font-size: medium;
        text-align: center;
    }
    form {
        text-align: center;
        font-size: small;
    }
    body {
        background-color: cadetblue;

    }
    button {
        background-color: aqua;
        font-size: medium;
        color: chocolate;
        text-align: center;
    }
</style>
</head>
<body>
    <h1>Enter your details</h1>
    <form>
        Name:
        <input type="text"><br>
        Age:
        <input type="number"><br>
        submit:
        <button type="submit">click me</button>
    </form>
</body>
</html>
