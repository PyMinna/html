<!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: grid;
    grid-template-columns: 100px 100px 100px;
    gap: 10px;
    
    
}

.box {
    width: 100px;
    height: 100px;
    background-color: khaki;
    align-content: center;
}
</style>
</head>
<body>
<div class="container">
    <div class="box"><center>1</center></div>
    <div class="box"><center>2</center></div>
    <div class="box"><center>3</center></div>
</div>
</body>
</html>
