<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display layout example</title>
    <style>
        .block {
            background-color: lightblue;
            border: 2px solid blue;
            padding: 10px;
            margin: 10px 0;
            display: block;

        }
       .inline {
            background-color: yellow;
            border: 2px solid orange;
            padding: 10px;
            margin: 10px 0;
            display: inline;
            width: 150px;
            height: 80px;
            line-height: 40px;
        }
        .inline-block {
            display: inline-block;
            width: 150px;
            height: 80px;
            background-color: brown;
            color: wheat;
            text-align: center;
            line-height: 80px;

        }
    </style>
</head>
<body>
    <h1>Display Property Practice (Block, Inline, Inline-Block)</h1>
    <h2>1. Block</h2>
    <div class="block">Block 1</div>
    <div class="block">Block 2</div>
    <div class="block">Block 3</div>

    <hr>

    <h2>2. Inline</h2>

    <div class="inline">Inline 1</div>
    <div class="inline">Inline 2</div>
    <div class="inline">Inline 3</div>

    <hr>

    <h2>3. Inline-Block</h2>

    <div class="inline-block">Inline-Block 1</div>
    <div class="inline-block">Inline-Block 2</div>
    <div class="inline-block">Inline-Block 3</div>

    <hr>
</body>
</html>
